name: Build and Release ULoader

on:
  push:
    branches:
      - main
    paths:
      - '**/*.py'
      - 'main.spec'
      - 'requirements.txt'
      - 'icon.ico'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Generate dynamic version resource
        id: version
        shell: pwsh
        run: |
          $tag = git describe --tags --abbrev=0 2>$null
          if (-not $tag) {
            $tag = 'v1.0.0'
          }

          $match = [regex]::Match($tag, '(\d+)\.(\d+)\.(\d+)')
          if ($match.Success) {
            $major = [int]$match.Groups[1].Value
            $minor = [int]$match.Groups[2].Value
            $patch = [int]$match.Groups[3].Value
          }
          else {
            $major = 1
            $minor = 0
            $patch = 0
          }

          $build = [int]$env:GITHUB_RUN_NUMBER
          if ($build -gt 65535) {
            $build = $build % 65535
          }

          $version = "$major.$minor.$patch.$build"

          @"
          # UTF-8
          VSVersionInfo(
            ffi=FixedFileInfo(
              filevers=($major, $minor, $patch, $build),
              prodvers=($major, $minor, $patch, $build),
              mask=0x3f,
              flags=0x0,
              OS=0x4,
              fileType=0x1,
              subtype=0x0,
              date=(0, 0)
            ),
            kids=[
              StringFileInfo(
                [
                  StringTable(
                    '040904B0',
                    [
                      StringStruct('FileDescription', 'Universal media downloader powered by yt-dlp and PyQt6'),
                      StringStruct('FileVersion', '$version'),
                      StringStruct('InternalName', 'ULoader'),
                      StringStruct('OriginalFilename', 'ULoader.exe'),
                      StringStruct('ProductName', 'ULoader'),
                      StringStruct('ProductVersion', '$version'),
                      StringStruct('Comments', 'Open-source media downloader'),
                      StringStruct('ProjectURL', 'https://github.com/CodeHorizon0/ULoader'),
                      StringStruct('ReleaseURL', 'https://github.com/CodeHorizon0/ULoader/releases'),
                      StringStruct('SupportURL', 'https://github.com/CodeHorizon0/ULoader/issues'),
                      StringStruct('License', 'MIT License')
                    ]
                  )
                ]
              ),
              VarFileInfo(
                [
                  VarStruct('Translation', [1033, 1200])
                ]
              )
            ]
          )
          "@ | Set-Content -Encoding utf8 version.txt

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build executable
        run: pyinstaller main.spec --noconfirm

      - name: Compress artifact
        shell: pwsh
        run: |
          Compress-Archive -Path dist\ULoader.exe -DestinationPath dist\ULoader-${{ steps.version.outputs.version }}.zip -Force

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" "dist\ULoader.exe" "dist\ULoader-${{ steps.version.outputs.version }}.zip" `
            --title "ULoader v${{ steps.version.outputs.version }}" `
            --notes "Automated build for commit ${{ github.sha }}" `
            --latest
